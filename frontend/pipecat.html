<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pipecat Spike — Voice Agent</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
      button { font-size: 1rem; padding: 0.5rem 1rem; margin-right: 0.5rem; }
      #status { margin-top: 1rem; font-family: ui-monospace, monospace; white-space: pre-wrap; }
      .row { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <h1>Pipecat Spike</h1>
    <p>WebSocket client for the Pipecat-based pipeline at <code>/api/ws</code>.</p>
    <div class="row">
      <button id="connect">Connect</button>
      <button id="disconnect" disabled>Disconnect</button>
    </div>
    <pre id="status">idle</pre>

    <script type="module">
      import { PipecatClient } from "https://esm.sh/@pipecat-ai/client-js@1?target=es2022";
      import { WebSocketTransport } from "https://esm.sh/@pipecat-ai/websocket-transport@1?target=es2022";

      const statusEl = document.getElementById("status");
      const connectBtn = document.getElementById("connect");
      const disconnectBtn = document.getElementById("disconnect");

      function log(...args) {
        const line = args.map((a) => (typeof a === "string" ? a : JSON.stringify(a))).join(" ");
        statusEl.textContent += "\n" + line;
        console.log(...args);
      }

      const wsScheme = location.protocol === "https:" ? "wss" : "ws";
      const wsUrl = `${wsScheme}://${location.host}/api/ws`;

      const client = new PipecatClient({
        transport: new WebSocketTransport(),
        enableMic: true,
        enableCam: false,
        callbacks: {
          onConnected:            () => log("connected"),
          onDisconnected:         () => {
            log("disconnected");
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
          },
          onBotConnected:         () => log("bot connected"),
          onBotReady:             () => log("bot ready"),
          onUserStartedSpeaking:  () => log("user speaking"),
          onUserStoppedSpeaking:  () => log("user stopped"),
          onBotStartedSpeaking:   () => log("bot speaking"),
          onBotStoppedSpeaking:   () => log("bot stopped"),
          onUserTranscript:       (d) => d.final && log("you:", d.text),
          onBotTranscript:        (d) => log("bot:", d.text),
          onError:                (e) => log("error:", e?.message ?? e),
        },
      });

      connectBtn.addEventListener("click", async () => {
        connectBtn.disabled = true;
        statusEl.textContent = "connecting...";
        try {
          await client.connect({ ws_url: wsUrl });
          disconnectBtn.disabled = false;
        } catch (e) {
          log("connect failed:", e?.message ?? e);
          connectBtn.disabled = false;
        }
      });

      disconnectBtn.addEventListener("click", async () => {
        disconnectBtn.disabled = true;
        try { await client.disconnect(); } catch (e) { log("disconnect error:", e?.message ?? e); }
      });
    </script>
  </body>
</html>
